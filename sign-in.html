const SUPABASE_KEY = 'sb_publishable_LCuEFxzVU9ZQLQkmAe4kuw_6tvJUpXp';

</script><script type="module">
const iEmail = document.getElementById('i-email');

const bContinue = document.getElementById('b-continue');
const wrapBtn = document.getElementById('wrap-btn');
const eEmail = document.getElementById('e-email');

document.getElementById('login-form').addEventListener('submit', e => e.preventDefault());
const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
function isValidEmail(v) { return emailRe.test(v.trim()); }
function looksLikeEmail(v) {
const t = v.trim();
return t.includes('@') && t.split('@')[1]?.length > 1;
}
iEmail.addEventListener('input', () => {
eEmail.classList.remove('show');
loginCard.classList.remove('bad');
if (looksLikeEmail(iEmail.value)) {
pwReveal.classList.add('show');
setTimeout(() => iPw.focus(), 280);
} else {
pwReveal.classList.remove('show');
wrapBtn.classList.remove('show');
bContinue.classList.remove('on');
}
});
iEmail.addEventListener('keydown', e => {
if (e.key === 'Enter' && looksLikeEmail(iEmail.value)) {
iPw.focus();
}
});
iPw.addEventListener('input', () => {
ePw.classList.remove('show');
loginCard.classList.remove('bad');
if (iPw.value.length > 0) {
wrapBtn.classList.add('show');
setTimeout(() => bContinue.classList.add('on'), 30);
} else {
bContinue.classList.remove('on');
wrapBtn.classList.remove('show');
}
});
iPw.addEventListener('keydown', e => { if (e.key === 'Enter') bContinue.click(); });
function setEyeState(visible) {
document.getElementById('eye-open').style.display = visible ? '' : 'none';
document.getElementById('eye-closed').style.display = visible ? 'none' : '';
document.getElementById('pw-eye').setAttribute('aria-label', visible ? 'Hide password' : 'Show password');
}
const pwOverlay = document.getElementById('pw-char-overlay');
let pwAnimToken = 0;
function animatePwChars(fromChars, toChars, onDone) {
const token = ++pwAnimToken;
const FLIP_MS = 320;
const STAGGER = 26;
pwOverlay.innerHTML = '';
const spans = fromChars.map(ch => {
const span = document.createElement('span');
span.className = 'pw-char';
span.textContent = ch;
pwOverlay.appendChild(span);
return span;
});
spans.forEach((span, i) => {
span.style.transition = 'none';
span.style.transform = 'rotateX(0deg) scale(1)';
span.style.opacity = '1';
span.style.filter = 'blur(0)';
setTimeout(() => {
if (pwAnimToken !== token) return;
span.style.transition = `transform ${FLIP_MS}ms cubic-bezier(0.4,0,0.2,1), opacity ${FLIP_MS * 0.55}ms ease, filter ${FLIP_MS * 0.55}ms ease`;
span.style.transform = 'rotateX(90deg) scale(0.55)';
span.style.opacity = '0.1';
span.style.filter = 'blur(2px)';
setTimeout(() => {
if (pwAnimToken !== token) return;
span.textContent = toChars[i];
span.style.transition = `transform ${FLIP_MS}ms cubic-bezier(0.34,1.56,0.64,1), opacity ${FLIP_MS * 0.6}ms ease, filter ${FLIP_MS * 0.6}ms ease`;
span.style.transform = 'rotateX(0deg) scale(1)';
span.style.opacity = '1';
span.style.filter = 'blur(0)';
}, FLIP_MS * 0.5);
}, i * STAGGER);
});
const total = (spans.length - 1) * STAGGER + FLIP_MS * 1.5;
setTimeout(() => { if (pwAnimToken === token) onDone(); }, total);
}
document.getElementById('pw-eye').addEventListener('click', () => {
const showing = iPw.type === 'text';
const value = iPw.value;
setEyeState(!showing);
if (!value) {
iPw.type = showing ? 'password' : 'text';
return;
}
const fromChars = value.split('').map(ch => showing ? ch : '•');
const toChars = value.split('').map(ch => showing ? '•' : ch);
iPw.style.color = 'transparent';
iPw.style.caretColor = 'transparent';
pwOverlay.classList.add('active');
animatePwChars(fromChars, toChars, () => {
iPw.type = showing ? 'password' : 'text';
pwOverlay.classList.remove('active');
iPw.style.color = '';
iPw.style.caretColor = '';
});
});
function revealByLetters(el, text, color) {
el.innerHTML = '';
if (color) el.style.color = color;
[...text].forEach((ch, i) => {
const span = document.createElement('span');
span.style.cssText = `display:inline-block;opacity:0;filter:blur(5px);transform:translateY(2px);` +
`transition:opacity 0.32s ease,filter 0.32s ease,transform 0.32s ease;transition-delay:${i * 30}ms`;
span.textContent = ch === ' ' ? '\u00A0' : ch;
el.appendChild(span);
requestAnimationFrame(() => requestAnimationFrame(() => {
span.style.opacity = '1';
span.style.filter = 'blur(0)';
span.style.transform = 'translateY(0)';
}));
});
}
let forgotSent = false;
let forgotBusy = false;
const bForgot = document.getElementById('b-forgot');
bForgot.addEventListener('click', async () => {
if (forgotSent || forgotBusy) return;
const email = iEmail.value.trim();
if (!isValidEmail(email)) {
eEmail.textContent = 'Enter your email first.';
eEmail.classList.add('show');
iEmail.focus();
return;
}
forgotBusy = true;
bForgot.style.pointerEvents = 'none';
bForgot.innerHTML = '<span class="btn-spinner" style="width:10px;height:10px;border-width:1.5px;margin-right:5px;"></span>Sending…';
try {
if (window.supabaseClient) {
await window.supabaseClient.functions.invoke('send-password-reset-email', { body: { email } });
}
} catch (_) { }
forgotBusy = false;
forgotSent = true;
revealByLetters(bForgot, 'Email sent', 'rgba(255,255,255,0.5)');
bForgot.style.pointerEvents = 'none';
bForgot.style.cursor = 'default';
});
function dissolveCard(callback) {
const STAGGER = 68;
const DURATION = 460;
const items = [
document.querySelector('#login-card .h1'),
document.querySelector('#login-card .sub'),
document.querySelector('#login-card .iw'),
document.querySelector('#login-card .err#e-email'),
document.querySelector('#login-card .pw-reveal'),
document.querySelector('#login-card .btn-wrap'),
].filter(Boolean);
const backBtn = document.getElementById('backButton');
if (backBtn) {
backBtn.style.transition = 'opacity 320ms ease, filter 320ms ease, transform 320ms ease';
backBtn.style.opacity = '0';
backBtn.style.filter = 'blur(6px)';
backBtn.style.transform = 'translateY(-8px)';
}
items.forEach((el, i) => {
setTimeout(() => {
el.style.transition = `opacity ${DURATION}ms cubic-bezier(0.4,0,1,1),
                             filter   ${DURATION}ms cubic-bezier(0.4,0,1,1),
                             transform ${DURATION}ms cubic-bezier(0.4,0,1,1)`;
el.style.opacity = '0';
el.style.filter = 'blur(14px)';
el.style.transform = 'translateY(-10px)';
}, i * STAGGER);
});
const totalMs = items.length * STAGGER + DURATION - 80;
setTimeout(callback, totalMs);
}
function resetCardStyles() {
const items = document.querySelectorAll(
'#login-card .h1, #login-card .sub, #login-card .iw, #login-card .err, #login-card .pw-reveal, #login-card .btn-wrap'
);
items.forEach(el => {
el.style.transition = '';
el.style.opacity = '';
el.style.filter = '';
el.style.transform = '';
});
const backBtn = document.getElementById('backButton');
if (backBtn) {
backBtn.style.transition = '';
backBtn.style.opacity = '';
backBtn.style.filter = '';
backBtn.style.transform = '';
}
}
async function authenticateCredentials(email, password) {
try {
const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
if (error) return null;
return { authenticated: true, session: data.session };
} catch (err) {
return null;
}
}
